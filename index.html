<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍷 葡萄酒简报 · 归档中心</title>
  <style>
    :root {
      --wine-deep: #6B1D2A;
      --wine-mid:  #A0344A;
      --wine-light:#D4607A;
      --gold:      #C9A84C;
      --gold-light:#F5E6C0;
      --bg:        #FDF6F0;
      --card-bg:   #FFFFFF;
      --text:      #2C1A22;
      --muted:     #7A5C68;
      --border:    #E8D5CC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--wine-deep) 0%, #4A1020 50%, #2A0810 100%);
      color: #fff;
      padding: 40px 24px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='28' fill='none' stroke='rgba(255,255,255,0.04)' stroke-width='1'/%3E%3C/svg%3E") repeat;
      opacity: .6;
    }
    header .emoji { font-size: 52px; display: block; margin-bottom: 10px; position: relative; }
    header h1 { font-size: 26px; font-weight: 800; letter-spacing: 1px; position: relative; }
    header .sub { font-size: 14px; color: rgba(255,255,255,.65); margin-top: 8px; position: relative; }
    .latest-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--gold);
      color: #2C1A22;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 24px;
      margin-top: 18px;
      text-decoration: none;
      position: relative;
      transition: transform .15s, box-shadow .15s;
    }
    .latest-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(201,168,76,.4); }

    /* ── MAIN ── */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 16px 60px;
    }

    /* ── MONTH NAVIGATOR ── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .month-nav button {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--wine-deep);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .month-nav button:hover { background: var(--wine-deep); color: #fff; border-color: var(--wine-deep); }
    .month-nav button:disabled { opacity: .3; cursor: not-allowed; }
    .month-nav button:disabled:hover { background: var(--card-bg); color: var(--wine-deep); border-color: var(--border); }
    .month-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--wine-deep);
      min-width: 130px;
      text-align: center;
    }

    /* ── CALENDAR GRID ── */
    .calendar-wrap {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(107,29,42,.06);
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: linear-gradient(135deg, var(--wine-deep), var(--wine-mid));
      padding: 10px 0 8px;
    }
    .cal-weekdays span {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,.8);
      letter-spacing: .5px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      padding: 8px;
    }

    .cal-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      margin: 3px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      position: relative;
      transition: all .15s;
    }

    .cal-cell.empty { pointer-events: none; }

    .cal-cell.has-briefing {
      background: linear-gradient(135deg, #FFF0F3, #FFEAEA);
      color: var(--wine-deep);
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid #F0C0CC;
      text-decoration: none;
    }
    .cal-cell.has-briefing:hover {
      background: linear-gradient(135deg, var(--wine-mid), var(--wine-deep));
      color: #fff;
      border-color: var(--wine-deep);
      transform: scale(1.08);
      box-shadow: 0 4px 16px rgba(107,29,42,.25);
      z-index: 2;
    }
    .cal-cell.has-briefing .wine-dot {
      position: absolute;
      bottom: 5px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--wine-mid);
    }
    .cal-cell.has-briefing:hover .wine-dot { background: rgba(255,255,255,.7); }

    .cal-cell.today-cell {
      background: var(--gold-light);
      color: var(--wine-deep);
      border: 2px solid var(--gold);
      font-weight: 700;
    }
    .cal-cell.today-cell.has-briefing {
      background: linear-gradient(135deg, #FFF8E7, #FFEFC0);
      border: 2px solid var(--gold);
    }
    .cal-cell.today-cell.has-briefing:hover {
      background: linear-gradient(135deg, var(--gold), #B8940A);
      color: #2C1A22;
      border-color: var(--gold);
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
    }
    .legend-dot.has { background: linear-gradient(135deg, #FFF0F3, #FFEAEA); border: 1.5px solid #F0C0CC; }
    .legend-dot.today { background: var(--gold-light); border: 2px solid var(--gold); }
    .legend-dot.empty { background: var(--bg); border: 1px solid var(--border); }

    /* ── LIST VIEW (fallback / mobile supplement) ── */
    .list-section { margin-top: 36px; }
    .list-section h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--wine-deep);
      margin-bottom: 12px;
      padding-left: 4px;
      border-left: 3px solid var(--gold);
      padding-left: 10px;
    }
    .issue-list { display: flex; flex-direction: column; gap: 8px; }
    .issue-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      text-decoration: none;
      color: var(--text);
      transition: all .15s;
    }
    .issue-item:hover {
      border-color: var(--wine-mid);
      box-shadow: 0 2px 10px rgba(107,29,42,.1);
      transform: translateX(3px);
    }
    .issue-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--wine-deep);
    }
    .issue-label {
      font-size: 12px;
      color: var(--muted);
    }
    .issue-arrow {
      color: var(--wine-light);
      font-size: 16px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <span class="emoji">🍷</span>
  <h1>葡萄酒行业每日简报</h1>
  <p class="sub">每日精选全球葡萄酒产业动态 · 自动更新</p>
  <a class="latest-btn" id="latest-link" href="#">
    📰 查看今日简报
  </a>
</header>

<main>

  <!-- Month Navigator -->
  <div class="month-nav">
    <button id="prev-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-title" id="month-title"></div>
    <button id="next-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>

  <!-- Calendar -->
  <div class="calendar-wrap">
    <div class="cal-weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span>
      <span>四</span><span>五</span><span>六</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot has"></div>
      <span>有简报</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot today"></div>
      <span>今天</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot empty"></div>
      <span>无简报</span>
    </div>
  </div>

  <!-- List View -->
  <div class="list-section">
    <h2>📋 全部期次</h2>
    <div class="issue-list" id="issue-list"></div>
  </div>

</main>

<footer>
  🍷 葡萄酒行业每日简报 · 由 WorkBuddy 自动生成
</footer>

<script>
  // ── 已有简报的日期列表（自动化每天追加） ──
  const BRIEFING_DATES = [
    "2026-03-25",
    "2026-03-26",
    "2026-04-07",
    "2026-04-10",
    "2026-04-13",
    "2026-04-14",
    "2026-04-15",
    "2026-04-16",
    "2026-04-17",
    "2026-04-19",
    "2026-04-20",
    "2026-04-21",
    "2026-04-22",
    "2026-04-23",
  ];

  const BASE_URL = "archives/wine-briefing-";

  function dateUrl(d) {
    return BASE_URL + d + ".html";
  }

  // Today
  const todayStr = new Date().toISOString().slice(0, 10);

  // Latest
  const latestDate = BRIEFING_DATES[BRIEFING_DATES.length - 1];
  document.getElementById("latest-link").href = dateUrl(latestDate);

  // Build Set for O(1) lookup
  const dateSet = new Set(BRIEFING_DATES);

  // ── Calendar state ──
  let currentYear, currentMonth;

  function init() {
    const today = new Date();
    currentYear = today.getFullYear();
    currentMonth = today.getMonth(); // 0-based
    renderCalendar();
    renderList();
  }

  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    renderCalendar();
  }

  const MONTH_NAMES = ["一月","二月","三月","四月","五月","六月",
                       "七月","八月","九月","十月","十一月","十二月"];

  function renderCalendar() {
    const title = document.getElementById("month-title");
    title.textContent = `${currentYear} 年 ${MONTH_NAMES[currentMonth]}`;

    // Prev/Next button limits
    const allDates = BRIEFING_DATES.map(d => new Date(d));
    const minDate = allDates[0];
    const maxDate = allDates[allDates.length - 1];

    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");

    const prevYear  = currentMonth === 0 ? currentYear - 1 : currentYear;
    const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
    const nextYear  = currentMonth === 11 ? currentYear + 1 : currentYear;
    const nextMonth = currentMonth === 11 ? 0 : currentMonth + 1;

    prevBtn.disabled = (prevYear < minDate.getFullYear()) ||
      (prevYear === minDate.getFullYear() && prevMonth < minDate.getMonth());
    nextBtn.disabled = (nextYear > maxDate.getFullYear()) ||
      (nextYear === maxDate.getFullYear() && nextMonth > maxDate.getMonth());

    // Days in month
    const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    const grid = document.getElementById("cal-grid");
    grid.innerHTML = "";

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement("div");
      cell.className = "cal-cell empty";
      grid.appendChild(cell);
    }

    // Day cells
    for (let d = 1; d <= daysInMonth; d++) {
      const mm = String(currentMonth + 1).padStart(2, "0");
      const dd = String(d).padStart(2, "0");
      const dateStr = `${currentYear}-${mm}-${dd}`;
      const hasBriefing = dateSet.has(dateStr);
      const isToday = dateStr === todayStr;

      if (hasBriefing) {
        const cell = document.createElement("a");
        cell.href = dateUrl(dateStr);
        cell.className = "cal-cell has-briefing" + (isToday ? " today-cell" : "");
        cell.setAttribute("title", dateStr + " 简报");
        cell.innerHTML = `${d}<span class="wine-dot"></span>`;
        grid.appendChild(cell);
      } else {
        const cell = document.createElement("div");
        cell.className = "cal-cell" + (isToday ? " today-cell" : "");
        cell.textContent = d;
        grid.appendChild(cell);
      }
    }
  }

  function renderList() {
    const list = document.getElementById("issue-list");
    // Show in reverse order (newest first)
    const sorted = [...BRIEFING_DATES].reverse();
    list.innerHTML = sorted.map((d, i) => {
      const isLatest = i === 0;
      const label = isLatest ? "最新一期" : `第 ${BRIEFING_DATES.length - i} 期`;
      return `
        <a class="issue-item" href="${dateUrl(d)}">
          <div>
            <div class="issue-date">📅 ${d}</div>
            <div class="issue-label">${label}</div>
          </div>
          <span class="issue-arrow">›</span>
        </a>
      `;
    }).join("");
  }

  init();
</script>
</body>
</html>
